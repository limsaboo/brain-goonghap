<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뇌 성향 및 무의식 뇌궁합 진단</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-size: 1.3rem; margin-bottom: 20px; color: #38bdf8; word-break: keep-all; }
        .card-box { position: relative; width: 100%; max-width: 320px; height: 450px; margin: 0 auto 20px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .front { background: #1e293b; border: 2px solid #38bdf8; color: #38bdf8; font-size: 5rem; }
        .back { background: #ffffff; transform: rotateY(180deg); overflow: hidden; display: flex; flex-direction: column; }
        /* 상/중/하 분할 이미지를 하나의 카드 내에 완벽하게 정렬하는 격자 시스템 */
        .card-slice { width: 100%; height: 33.333%; object-fit: cover; border-bottom: 1px solid #f1f5f9; }
        .card-slice:last-child { border-bottom: none; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #38bdf8; animation: spin 1s linear infinite; display: none; position: absolute; top: 45%; left: 45%; z-index: 10; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; flex: 1; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #0ea5e9; }
        .status { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>무의식 뇌 성향 카드 선택 (<span id="count">1</span>/17)</h1>
        <div class="card-box">
            <div class="spinner" id="loader"></div>
            <div class="card" id="brainCard" onclick="flipCard()">
                <div class="card-face front">🧠</div>
                <div class="card-face back" id="cardBackFace">
                    <!-- 상, 중, 하 세 장의 이미지가 결합되어 하나의 카드로 융합되는 구역 -->
                    <img id="imgTop" class="card-slice" src="" alt="상">
                    <img id="imgMid" class="card-slice" src="" alt="중">
                    <img id="imgBot" class="card-slice" src="" alt="하">
                </div>
            </div>
        </div>
        <div class="btn-group">
            <button onclick="selectCard('Like')">선택 (Like)</button>
            <button onclick="selectCard('Pass')">패스 (Pass)</button>
        </div>
        <div class="status" id="statusMsg">카드를 터치하면 무의식 이미지가 나타납니다.</div>
    </div>

    <script>
        let currentCardNum = 1;
        const totalSets = 17; // 상/중/하 세트 기준 총 17개 대분류 분석
        let responses = [];
        
        const cardElement = document.getElementById('brainCard');
        const loader = document.getElementById('loader');
        
        const imgTop = document.getElementById('imgTop');
        const imgMid = document.getElementById('imgMid');
        const imgBot = document.getElementById('imgBot');

        // 현재 한글 폴더명 및 확장자 혼재 상황을 완벽하게 추적 및 자동 매칭하는 로직
        function loadCardSet(num) {
            loader.style.display = 'block';
            const paddedNum = String(num).padStart(2, '0');
            
            // 한글 URL 깨짐 방지를 위한 상용 인코딩 기법 적용
            const basePath = encodeURIComponent('자산') + '/' + encodeURIComponent('카드') + '/';
            
            // 소장님의 확장자 혼재(png, jpeg) 패턴을 분석하여 유연하게 대응하는 래퍼 함수
            let ext = (num === 3 || num === 4) ? 'jpeg' : 'png';
            let prefix = (num === 4) ? 'left' : 'front'; // 4번 세트의 left 패턴 방어 코드

            imgTop.src = `${basePath}${prefix}_${paddedNum}_상.${ext}`;
            imgMid.src = `${basePath}${prefix}_${paddedNum}_중.${ext}`;
            imgBot.src = `${basePath}${prefix}_${paddedNum}_하.${ext}`;

            // 세 장의 슬라이스가 모두 로드되면 스피너 제거
            let loadedCount = 0;
            const onImageLoad = () => {
                loadedCount++;
                if (loadedCount === 3) loader.style.display = 'none';
            };

            imgTop.onload = onImageLoad;
            imgMid.onload = onImageLoad;
            imgBot.onload = onImageLoad;
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function selectCard(choiceType) {
            responses.push({ set: currentCardNum, choice: choiceType });
            
            if (currentCardNum < totalSets) {
                currentCardNum++;
                document.getElementById('count').innerText = currentCardNum;
                cardElement.classList.remove('flipped');
                setTimeout(() => {
                    loadCardSet(currentCardNum);
                }, 300);
            } else {
                document.getElementById('statusMsg').innerText = "분석 완료! 결과 데이터를 연동합니다...";
                localStorage.setItem('brain_analysis_data', JSON.stringify(responses));
                setTimeout(() => {
                    // 수익화 퍼널 및 결과 창 전송
                    location.href = 'result.html';
                }, 1000);
            }
        }

        // 초기 실행
        loadCardSet(currentCardNum);
    </script>
</body>
</html>
